extends: default
font:
  catalog:
    # 定义中文字体
    NotoSansSC:
      normal: NotoSansSC-Regular.ttf
      bold: NotoSansSC-Bold.ttf
      italic: NotoSansSC-Regular.ttf
      bold_italic: NotoSansSC-Bold.ttf
    # 定义你上传的 Roboto 字体
    Roboto:
      normal: Roboto-Regular.ttf
      bold: Roboto-Regular.ttf # 如果没有 Bold 文件，暂用 Regular 替代
  fallbacks:
    - NotoSansSC
page:
  layout: portrait
base:
  # 正文优先使用 Roboto，遇到中文自动回退到 NotoSansSC
  font_family: Roboto
  font_size: 10.5
  line_height_length: 15
heading:
  # 标题使用思源黑体加粗
  font_family: NotoSansSC
  font_style: bold
  font_color: #1a1a1a
code:
  # 代码块配置
  font_family: Roboto
  font_size: 9