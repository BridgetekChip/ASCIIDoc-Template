extends: default

# Asciidoctor PDF theme for Simplified Chinese.
# Use explicit SC TTF fonts instead of the distro TTC collection so glyph
# selection doesn't fall back to the Japanese face.
font:
  catalog:
    merge: true
    NotoSansSC: /usr/local/share/fonts/noto-cjk-sc/NotoSansCJKsc-VF.ttf
    NotoSansMonoSC: /usr/local/share/fonts/noto-cjk-sc/NotoSansMonoCJKsc-VF.ttf
  fallbacks:
    - Noto Serif

base:
  font-family: NotoSansSC
  font-size: 10
  line-height-length: 14
  text-align: left

heading:
  font-family: NotoSansSC
  font-style: bold

code:
  font-family: NotoSansMonoSC
  font-size: 9

codespan:
  font-family: NotoSansMonoSC

# Better spacing for Chinese paragraphs
prose:
  margin-inner: 0
