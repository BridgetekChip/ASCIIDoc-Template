extends: default

# Asciidoctor PDF theme for Simplified Chinese (SC).
#
# We use region-specific OTF files instead of a TTC collection because
# Asciidoctor PDF / Prawn can otherwise select the JP face from the TTC.
font:
  catalog:
    merge: true
    NotoSansSC:
      normal: /usr/local/share/fonts/noto-cjk-sc/NotoSansCJKsc-Regular.otf
      bold: /usr/local/share/fonts/noto-cjk-sc/NotoSansCJKsc-Bold.otf
      italic: /usr/local/share/fonts/noto-cjk-sc/NotoSansCJKsc-Regular.otf
      bold_italic: /usr/local/share/fonts/noto-cjk-sc/NotoSansCJKsc-Bold.otf
    NotoSansMonoSC:
      normal: /usr/local/share/fonts/noto-cjk-sc/NotoSansMonoCJKsc-Regular.otf
      bold: /usr/local/share/fonts/noto-cjk-sc/NotoSansMonoCJKsc-Bold.otf
      italic: /usr/local/share/fonts/noto-cjk-sc/NotoSansMonoCJKsc-Regular.otf
      bold_italic: /usr/local/share/fonts/noto-cjk-sc/NotoSansMonoCJKsc-Bold.otf
  fallbacks:
    - Noto Serif

base:
  font-family: NotoSansSC
  font-size: 10
  line-height-length: 14
  text-align: left

heading:
  font-family: NotoSansSC
  font-style: bold

codespan:
  font-family: NotoSansMonoSC

kbd:
  font-family: $codespan-font-family

code:
  font-family: $codespan-font-family
  font-size: 9

# Better spacing for Chinese paragraphs
prose:
  margin-inner: 0
