extends: default

# Asciidoctor PDF theme for Simplified Chinese (SC).
#
# Asciidoctor PDF documents that TTF is the most reliable CJK font format.
font:
  catalog:
    merge: true
    NotoSansSC:
      normal: NotoSansCJKsc-VF.ttf
      bold: NotoSansCJKsc-VF.ttf
      italic: NotoSansCJKsc-VF.ttf
      bold_italic: NotoSansCJKsc-VF.ttf
    NotoSansMonoSC:
      normal: NotoSansMonoCJKsc-VF.ttf
      bold: NotoSansMonoCJKsc-VF.ttf
      italic: NotoSansMonoCJKsc-VF.ttf
      bold_italic: NotoSansMonoCJKsc-VF.ttf
  fallbacks:
    - Noto Serif

base:
  font-family: NotoSansSC
  font-size: 10
  line-height-length: 14
  text-align: left

heading:
  font-family: NotoSansSC
  font-style: bold

codespan:
  font-family: NotoSansMonoSC

kbd:
  font-family: $codespan-font-family

code:
  font-family: $codespan-font-family
  font-size: 9

# Better spacing for Chinese paragraphs
prose:
  margin-inner: 0
